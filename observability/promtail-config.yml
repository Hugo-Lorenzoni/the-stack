server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: cpv-app-file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: cpv-app
          service: cpv-app
          __path__: /workspace/logs/*.log

    pipeline_stages:
      - json:
          expressions:
            time: time
            level: level
            service: service
            environment: environment
            page: page
            path: path
            method: method
            outcome: outcome
            status_code: status_code
            request_id: request_id
            flow_id: flow_id
            duration_ms: duration_ms
            event: event
      - labels:
          level:
          service:
          environment:
          outcome:
          method:
      - timestamp:
          source: time
          format: UnixMs
